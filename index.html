<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poem Generator</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/axios@1.1.2/dist/axios.min.js"></script>
</head>
<body>
  <div class="container">
  <header>
    <h1>Poem Generator</h1>
  </header>
  <main>
    <div class="form-container">
      <form id="poem-generator-form">
        <input type="text" 
        placeholder="Enter topic of a poem"
        autofocus
        required
        autocomplete="off"
        class="instructions"
        id="instructions"
        >
        <input type="submit" class="submit-button"/>
      </form>
    <div class="hint">Think of a topic for a poem, such as "love", "nature", or "friendship".</div>
    </div>
    <div class="poem hidden" id="poem"></div>
  </main>
  <footer>
    This AI project was coded by
    <a href="https://github.com/SnoopyJacks" target="_blank">Justine Ziola</a> and
    is
    <a
      href="https://github.com/SnoopyJacks/french-poem-generator"
      target="_blank"
    >
      open-sourced on GitHub</a
    >
    and is
    <a href="https://jz-poem-generator.netlify.app" target="_blank"
      >hosted on Netlify</a
    >
  </footer>
</div>
<script src="index.js"></script>
</body>
</html>
